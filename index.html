<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini mini AR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
              <h1 class="fw-bold mb-2">Mini mini AR</h1>
              <p class="text-muted mb-4">Gift exchange organizer</p>

              <div class="d-grid gap-2">
                <a class="btn btn-primary btn-lg" href="./pages/setup.html">Start setup</a>
                <button id="btnReiniciar" class="btn btn-outline-danger">Reset local data</button>
              </div>

              <div id="msgReinicio" class="mt-3"></div>
            </div>
          </div>

          <div class="mt-3 small text-muted text-center">
            Authors: Alexis acosta, Ricardo Figueroa
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/storage.js"></script>
    <script>
      (function () {
        const btnReiniciar = document.getElementById("btnReiniciar");
        const msgReinicio = document.getElementById("msgReinicio");

        btnReiniciar.addEventListener("click", function () {
          reiniciarEstado();
          msgReinicio.innerHTML = '<div class="alert alert-success mb-0">Local data cleared</div>';
        });
      })();
    </script>
  </body>
</html>
