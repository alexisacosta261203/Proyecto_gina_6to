<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini mini AR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body class="custom-bg">
    <main class="vh-100 d-flex align-items-center">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-9 col-lg-6">
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
              <div class="p-5 text-center bg-white">
                <div class="mx-auto mb-3 d-flex align-items-center justify-content-center border rounded-4 shadow-sm"
                     style="width:84px;height:84px;background:#f8f9fa;">
                  <img
                    src="./assets/image.png"
                    alt="App logo"
                    style="width:250px;height:190px;object-fit:contain;"
                    onerror="this.style.display='none'"
                  />
                </div>

                <h1 class="fw-bold mb-2">Mini mini AR</h1>
                <p class="text-muted mb-4">
                  Gift exchange organizer
                </p>

                <div class="d-grid gap-2">
                  <a class="btn btn-primary btn-lg rounded-4" href="./pages/setup.html">Start</a>
                  <button id="btnReiniciar" class="btn btn-outline-danger rounded-4" type="button">
                    Reset local data
                  </button>
                </div>

                <div id="msgReinicio" class="mt-3"></div>

                <div class="mt-4 small text-muted">
                  Authors: Alvaro Alexis Acosta Villalpando, Angel Ricardo Figueroa Flores
                </div>
              </div>

              <div class="px-4 py-3 bg-light border-top text-center small text-muted">
                Data is stored locally using localStorage
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/storage.js"></script>
    <script>
      (function () {
        const btnReiniciar = document.getElementById("btnReiniciar");
        const msgReinicio = document.getElementById("msgReinicio");

        btnReiniciar.addEventListener("click", function () {
          resetState();
          msgReinicio.innerHTML = '<div class="alert alert-success mb-0">Local data cleared</div>';
        });
      })();
    </script>
  </body>
</html>
