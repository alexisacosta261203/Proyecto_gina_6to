<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configuracion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="../index.html">
           <img src="../assets/image.png" alt="Logo Mini mini AR" width="100" height="60" style="object-fit: contain;">
          <span>Mini mini AR</span></a>
        <div class="ms-auto">
          <a class="btn btn-sm btn-outline-secondary" href="../index.html">Home</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-3">
        <div class="col-12 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="h5 fw-bold mb-3">Organizer</h2>

              <div class="mb-3">
                <label for="nombreOrganizador" class="form-label">Organizer name</label>
                <input id="nombreOrganizador" type="text" class="form-control" placeholder="Type a name" />
              </div>

              <div class="form-check mb-2">
                <input id="organizadorIncluido" class="form-check-input" type="checkbox" />
                <label class="form-check-label" for="organizadorIncluido">Organizer participates</label>
              </div>

              <div id="msgOrganizador" class="mt-3"></div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="h5 fw-bold mb-3">Participants</h2>

              <div class="input-group mb-3">
                <input id="inputParticipante" type="text" class="form-control" placeholder="Add participant name" />
                <button id="btnAgregarParticipante" class="btn btn-primary" type="button">Add</button>
              </div>

              <ul id="listaParticipantes" class="list-group mb-3"></ul>

              <div id="msgParticipantes" class="mb-3"></div>

              <div class="d-flex gap-2">
                <a class="btn btn-outline-secondary w-50" href="../index.html">Back</a>
                <button id="btnContinuar" class="btn btn-success w-50" type="button">Continue</button>
              </div>

              <div class="small text-muted mt-3">
                Note: Organizer is added automatically only if "Organizer participates" is checked.
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/setup.js"></script>
  </body>
</html>
